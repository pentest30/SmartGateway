version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

  gateway-host:
    build:
      context: .
      dockerfile: src/SmartGateway.Host/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__SmartGateway: "Server=sqlserver,1433;Database=SmartGateway;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
    depends_on:
      - sqlserver

  gateway-admin:
    build:
      context: .
      dockerfile: src/SmartGateway.Admin/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__SmartGateway: "Server=sqlserver,1433;Database=SmartGateway;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
    depends_on:
      - sqlserver

  gateway-api:
    build:
      context: .
      dockerfile: src/SmartGateway.Api/Dockerfile
    ports:
      - "5002:8080"
    environment:
      ConnectionStrings__SmartGateway: "Server=sqlserver,1433;Database=SmartGateway;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
    depends_on:
      - sqlserver

volumes:
  sqldata:
